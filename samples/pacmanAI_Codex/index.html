<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Neon Maze Chase</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <main class="shell" aria-label="Neon Maze Chase game">
    <canvas id="game" width="552" height="576" aria-label="Game canvas"></canvas>
    <section class="touch-pad" aria-label="Touch controls">
      <button data-dir="up" aria-label="Move up">▲</button>
      <button data-dir="left" aria-label="Move left">◀</button>
      <button data-dir="down" aria-label="Move down">▼</button>
      <button data-dir="right" aria-label="Move right">▶</button>
    </section>
  </main>
  <script src="src/main.js" defer></script>
</body>
</html>
