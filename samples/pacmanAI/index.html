<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAC-MAN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }

        #touch-controls {
            display: none;
            width: 100%;
            max-width: 560px;
            padding: 8px;
        }
        .swipe-area {
            width: 100%;
            height: 100px;
            border: 2px solid #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-family: monospace;
            font-size: 12px;
            letter-spacing: 1px;
        }
        @media (pointer: coarse), (max-width: 768px) {
            #touch-controls { display: block; }
            body { justify-content: flex-start; padding-top: 5px; }
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="touch-controls">
        <div class="swipe-area">SWIPE TO MOVE</div>
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
